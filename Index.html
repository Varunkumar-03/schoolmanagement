<!DOCTYPE html>
<html>

<head>
  <title>HAPPY TUITIONS</title>
  <link rel="icon" type="image/x-icon" href="https://lh3.googleusercontent.com/d/1RQzWWDrdStBjWZiuZNXk7qzeoQCRJmbI">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Comic+Sans+MS&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Comic Sans MS', cursive;
      background-color: #f0f8ff;
      color: #333;
      margin: 0;
      box-sizing: border-box;
      padding-top: 60px;
      /* Space for mobile navbar */
    }

    @media (min-width: 992px) {
      body {
        padding-top: 0;
      }
    }

    /* Sidebar Styles */
    .sidebar {
      background-color: #ffd700;
      min-height: 100vh;
      padding: 0;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px;
      text-align: left;
    }

    .sidebar-content {
      padding: 0 10px 20px 10px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .sidebar button {
      margin-bottom: 10px;
      width: 100%;
      background-color: #87ceeb;
      border: none;
      color: white;
      padding: 12px;
      border-radius: 8px;
      transition: all 0.3s;
      text-align: left;
      font-weight: bold;
      white-space: normal;
      /* Allow text wrap if needed or ellipsis */
    }

    .sidebar button:hover {
      background-color: #00bfff;
      transform: translateX(5px);
    }

    .content {
      padding: 20px;
      padding-bottom: 60px;
      min-height: 100vh;
    }

    @media (min-width: 992px) {
      .content {
        margin-left: 250px;
      }

      .offcanvas-lg {
        position: fixed;
        top: 0;
        left: 0;
        width: 250px;
        height: 100vh;
        z-index: 1000;
        visibility: visible !important;
        transform: none !important;
      }

      .mobile-navbar {
        display: none;
      }
    }

    .table-responsive {
      margin-bottom: 15px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      /* Smooth scrolling on iOS */
    }

    /* Ensure tables act like desktop tables on mobile (scrolling instead of squashing) */
    @media (max-width: 768px) {

      table th,
      table td {
        white-space: nowrap;
      }
    }

    /* Mobile Card View for Tables */
    @media (max-width: 768px) {

      table,
      thead,
      tbody,
      th,
      td,
      tr {
        display: block;
      }

      thead tr {
        position: absolute;
        top: -9999px;
        left: -9999px;
      }

      tr {
        margin-bottom: 15px;
        border: 1px solid #ffd700;
        border-radius: 10px;
        background: #fff;
        padding: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      }

      td {
        border: none;
        border-bottom: 1px solid #eee;
        position: relative;
        padding: 10px !important;
        text-align: left;
        width: 100%;
        display: block;
      }

      td:before {
        position: relative;
        display: block;
        width: 100%;
        padding-bottom: 2px;
        white-space: nowrap;
        text-align: left;
        font-weight: bold;
        color: #666;
        font-size: 0.85rem;
        content: attr(data-label);
      }

      td>* {
        display: inline-block;
      }

      td:last-child {
        border-bottom: 0;
      }

      .btn-sm {
        font-size: 0.9rem;
        padding: 0.5rem 1rem;
      }
    }

    /* Cards and other elements */
    .card {
      background-color: #fffacd;
      border: 1px solid #ffd700;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }

    .card-header {
      background-color: #ffd700;
      font-weight: bold;
      border-bottom: none;
      border-radius: 10px 10px 0 0 !important;
    }

    .form-control,
    .form-select,
    .btn {
      border-radius: 5px;
    }

    .footer {
      text-align: center;
      padding: 10px;
      margin-top: auto;
      font-size: 0.8rem;
    }

    /* Login Specifics */
    #login {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100%;
      background-color: #f0f8ff;
      position: fixed;
      /* Ensure it covers everything */
      top: 0;
      left: 0;
      z-index: 2000;
    }

    #loginForm {
      width: 90%;
      max-width: 400px;
    }

    video {
      width: 100%;
      max-width: 250px;
      border-radius: 5px;
      display: block;
      margin: 0 auto;
    }

    canvas {
      width: 100%;
      max-height: 300px;
    }

    /* Enhanced Table Clarity */
    .table-premium {
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    .table-premium thead {
      background: linear-gradient(135deg, #ff4d4d, #ff3333) !important;
      color: white;
    }

    .table-premium th {
      padding: 15px 12px !important;
      border: none;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .table-premium td {
      padding: 12px;
      vertical-align: middle;
      border-bottom: 1px solid #f0f0f0;
    }

    .table-premium tbody tr:hover {
      background-color: #fff9f9;
    }

    .bg-pending-row {
      background-color: #fffaf0;
    }

    .table-premium th {
      background-color: #f8f9fa;
      color: #333;
    }

    /* Faculty ID Card Styles */
    .faculty-id-card {
      transition: transform 0.3s, box-shadow 0.3s;
      border-radius: 15px;
      overflow: hidden;
      background: white;
      border: 1px solid #eef2f7;
    }

    .faculty-id-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08) !important;
    }

    .id-card-photo {
      width: 130px;
      height: 130px;
      object-fit: cover;
      object-position: center;
      border-radius: 50%;
      border: 4px solid #fff;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
      background-color: #fff;
      image-rendering: -webkit-optimize-contrast; /* Sharpens images */
    }

    .id-card-photo-container {
      background: linear-gradient(135deg, #87ceeb 0%, #ffd700 100%);
      padding: 25px 0;
      margin-bottom: 60px;
      position: relative;
    }

    .id-card-photo-wrapper {
      position: absolute;
      bottom: -55px;
      left: 50%;
      transform: translateX(-50%);
    }

    .id-card-details {
      padding-top: 10px;
    }

    .id-card-subjects .badge {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 15px;
      background-color: #f0f4f8;
      color: #4a5568;
      border: 1px solid #e2e8f0;
    }
  </style>
</head>

<body>
  <div id="login">
    <div id="loginForm" class="card">
      <div class="card-header text-center">
        <img src="https://lh3.googleusercontent.com/d/1RQzWWDrdStBjWZiuZNXk7qzeoQCRJmbI" alt="Logo" class="mb-2"
          style="max-width: 100px;"><br>
        Login to HAPPY TUITIONS
      </div>
      <div class="card-body">
        <input type="text" id="username" class="form-control mb-3" placeholder="Username"
          onkeypress="handleEnter(event)">
        <input type="password" id="password" class="form-control mb-3" placeholder="Password"
          onkeypress="handleEnter(event)">
        <button class="btn btn-primary w-100" onclick="login()">Login</button>
        <div class="mt-3 text-center">
          <a href="#" onclick="openChangePasswordModal(); return false;" class="text-decoration-none small">Change
            Password</a>
        </div>
      </div>
    </div>
  </div>

  <div id="main" style="display:none;">
    <!-- Mobile Header -->
    <nav class="navbar mobile-navbar fixed-top bg-warning p-2 shadow-sm d-lg-none">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">HAPPY TUITIONS</span>
        <button class="btn btn-outline-dark" type="button" data-bs-toggle="offcanvas"
          data-bs-target="#sidebarOffcanvas">
          <span class="navbar-toggler-icon"
            style="background-image: url('data:image/svg+xml,%3Csvg viewBox=\'0 0 30 30\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cpath stroke=\'rgba(0, 0, 0, 0.7)\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-miterlimit=\'10\' d=\'M4 7h22M4 15h22M4 23h22\'/%3E%3C/svg%3E'); display:inline-block; width:1.5em; height:1.5em; vertical-align:middle; background-repeat:no-repeat; background-position:center;"></span>
        </button>
      </div>
    </nav>

    <!-- Sidebar (Offcanvas on Mobile, Fixed on Desktop) -->
    <div class="offcanvas-lg offcanvas-start sidebar" tabindex="-1" id="sidebarOffcanvas">
      <div class="offcanvas-header bg-warning">
        <h5 class="offcanvas-title">Menu</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebarOffcanvas"
          aria-label="Close"></button>
      </div>
      <div class="offcanvas-body sidebar-content">
        <div class="sidebar-header d-none d-lg-block">
          <img src="https://lh3.googleusercontent.com/d/1RQzWWDrdStBjWZiuZNXk7qzeoQCRJmbI" alt="Logo"
            class="img-fluid rounded-circle mb-2" style="max-width: 80px;">
          <h4>HAPPY TUITIONS</h4>
        </div>

        <div class="d-grid gap-2 w-100">
          <button onclick="showPage('addStudent'); closeMobileMenu()"><i class="fas fa-user-plus me-2"></i>Add New Student</button>
          <button onclick="showPage('studentDetails'); closeMobileMenu()"><i class="fas fa-users me-2"></i>Student Details</button>
          <button onclick="showPage('studentDashboard'); closeMobileMenu()"><i class="fas fa-chart-line me-2"></i>Student Dashboard</button>
          <button onclick="showPage('weeklyTestResults'); closeMobileMenu()" style="display:none;"><i class="fas fa-file-invoice me-2"></i>Weekly Test Results</button>
          <button onclick="showPage('weeklyTestDashboard'); closeMobileMenu()" style="display:none;"><i class="fas fa-vial me-2"></i>Weekly Test Dashboard</button>
          <button onclick="showPage('markAttendance'); closeMobileMenu()" style="display:none;"><i class="fas fa-calendar-check me-2"></i>Mark Attendance</button>
          <button onclick="showPage('attendanceDashboard'); closeMobileMenu()" style="display:none;"><i class="fas fa-clipboard-list me-2"></i>Attendance Dashboard</button>
          <!-- Faculty and Admin buttons removed as per request -->
          <button id="facultyDashboardBtn" style="display:none;"
            onclick="showPage('facultyDashboard'); closeMobileMenu()"><i class="fas fa-chalkboard-teacher me-2"></i>Faculty Dashboard</button>
          <!--
          <button id="manageAdminsBtn" style="display:none;" onclick="showPage('manageAdmins'); closeMobileMenu()"><i class="fas fa-user-shield me-2"></i>Manage Admins</button>
          -->

          <!-- New Super Admin Buttons -->
          <button id="feeDetailsBtn" style="display:none;" onclick="showPage('feeDetails'); closeMobileMenu()"><i class="fas fa-receipt me-2"></i>Fee Details</button>
          <button id="addEventBtn" style="display:none;" onclick="showPage('addEvent'); closeMobileMenu()"><i class="fas fa-calendar-plus me-2"></i>Add Event</button>
          <button id="eventExpensesBtn" style="display:none;"
            onclick="showPage('eventExpenses'); closeMobileMenu()"><i class="fas fa-money-bill-wave me-2"></i>Event Expenses</button>
          <button id="revenueBtn" style="display:none;"
            onclick="showPage('revenue'); closeMobileMenu()"><i class="fas fa-vault me-2"></i>Revenue</button>
          <button id="monthWisePaymentsBtn" style="display:none;"
            onclick="showPage('monthWisePayments'); closeMobileMenu()"><i class="fas fa-calendar-alt me-2"></i>Month Wise Payments</button>
          <button id="pendingPaymentsBtn" style="display:none;"
            onclick="showPage('pendingPayments'); closeMobileMenu()"><i class="fas fa-exclamation-circle me-2"></i>Pending Payments</button>
          <button onclick="logout()" class="btn-danger mt-2"><i class="fas fa-sign-out-alt me-2"></i>Logout</button>
        </div>

        <div class="footer mt-auto">Crafted by <img
            src="https://lh3.googleusercontent.com/d/1-MDUOULMfWJBCNzte7AI8Y-KcftD6RpI" alt="Logo"
            style="height:20px; vertical-align:middle;"></div>
      </div>
    </div>

    <div class="content" id="content"></div>

    <!-- Payment History Modal -->
    <div class="modal fade" id="paymentHistoryModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-info text-white">
            <h5 class="modal-title">Payment History</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <table class="table table-striped table-bordered">
              <thead>
                <tr>
                  <th>Date (dd-mm-yyyy)</th>
                  <th>Amount</th>
                  <th>Month-Year</th>
                </tr>
              </thead>
              <tbody id="paymentHistoryBody">
              </tbody>
            </table>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Change Password Modal -->
    <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true" style="z-index: 2050;">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-warning">
            <h5 class="modal-title">Change Password</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" id="cpUsername" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Old Password</label>
              <input type="password" id="cpOldPassword" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input type="password" id="cpNewPassword" class="form-control">
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" onclick="submitChangePassword()">Update Password</button>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Deleted Students Modal -->
    <div class="modal fade" id="deletedStudentsModal" tabindex="-1" aria-hidden="true" style="z-index: 2050;">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header bg-danger text-white">
            <h5 class="modal-title"><i class="fas fa-user-times me-2"></i>Deleted Students & Alumni</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="input-group mb-3">
               <input type="text" id="deletedStudentSearch" class="form-control" placeholder="Search by name or contact..." onkeypress="if(event.key==='Enter') searchDeletedStudents()">
               <button class="btn btn-danger" onclick="searchDeletedStudents()">Search</button>
            </div>
            <div class="table-responsive">
              <table class="table table-bordered table-striped table-premium" id="deletedStudentsTable">
                <thead class="bg-danger text-white">
                  <tr><th>ID</th><th>Date Joining</th><th>Name</th><th>Class</th><th>Parent Contact</th><th>Actual Fee</th><th>Paid Fee</th><th>Deleted At</th></tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- GOOGLE SCRIPT RUN POLYFILL ---
    // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzgPAHaihp-o9f_a2wuoHMykILtgIYS-0R1OwAk2Pb1t4F4caqeQf6YSOOwAx1Mjjo5/exec';

    if (typeof google === 'undefined' || !google.script || !google.script.run) {
      window.google = {
        script: {
          run: {
            withSuccessHandler: function (successCallback) {
              this._onSuccess = successCallback;
              return this;
            },
            withFailureHandler: function (failureCallback) {
              this._onFailure = failureCallback;
              return this;
            },
            // Dynamic handler for all function calls
          }
        }
      };

      // Define proxies for all functions used in the app
      const functionsToProxy = [
        'login', 'getStudents', 'getStudentStats', 'addStudent', 'updateStudent', 'deleteStudent',
        'getTests', 'getTestStats', 'addTest', 'updateTest', 'deleteTest',
        'getEvents', 'getEventStats', 'addEvent', 'deleteEvent', 'getFeeDetails', 'getFeeStats',
        'getRevenueData', 'getMonthYearOptions', 'getMonthWiseData', 'getPendingPaymentsData', 'getPaymentHistoryDebug',
        'changePassword', 'getNextId', 'exportToExcel', 'exportToPDF', 'getDashboardData',
        'getFaculty', 'addFaculty', 'updateFaculty', 'deleteFaculty', 'uploadImage', 'getDeletedStudents'
      ];

      functionsToProxy.forEach(fnName => {
        google.script.run[fnName] = function (...args) {
          const successCallback = this._onSuccess;
          const failureCallback = this._onFailure;

          // Clear internal handlers to prevent state leakage to next call
          this._onSuccess = null;
          this._onFailure = null;

          fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify({
              functionName: fnName,
              arguments: args
            })
          })
            .then(response => response.json())
            .then(res => {
              if (res.success) {
                if (successCallback) successCallback(res.data);
              } else {
                if (failureCallback) failureCallback(res.error);
                else console.error('GAS Error:', res.error);
              }
            })
            .catch(err => {
              if (failureCallback) failureCallback(err);
              else console.error('Fetch Error:', err);
            });
        };
      });
    }

    function handleEnter(e) {
      if (e.key === "Enter") login();
    }

    // Helper to format date as dd-mm-yyyy for display
    function formatDateDisplay(dateString) {
      if (!dateString) return '';
      const s = String(dateString);
      const parts = s.split('-');
      if (parts.length === 3) {
        return `${parts[2]}-${parts[1]}-${parts[0]}`;
      }
      return s;
    }

    // --- CACHE & DATA STORE ---
    const DATA_CACHE = {
      students: null,
      studentStats: null,
      tests: null,
      testStats: null,
      faculty: null,
      facultyStats: null,
      events: null,
      eventStats: null,
      feeStats: null,
      feeDetails: null,
      revenueData: null,
      monthYearOptions: null,
      monthWiseData: {},
      pendingPaymentsData: {}
    };

    const UI_STATE = {
      selectedMonthWiseMonth: '',
      selectedPendingMonth: ''
    };

    const PRIMARY_CLASSES = ['LKG', 'UKG', 'Class 1', 'Class 2', 'Class 3', 'Class 4', 'Class 5', 'Primary'];
    const SENIOR_CLASSES = ['Class 6', 'Class 7', 'Class 8', 'Class 9', 'Class 10', 'Inter 1st year', 'Inter 2nd year', 'Senior', 'Diploma', 'Degree'];

    function isSeniorClass(cls) {
      const c = (cls || '').toString().toLowerCase().trim();
      if (!c) return false;
      const seniorKeywords = ['6', '7', '8', '9', '10', 'inter', 'senior', 'high school', 'diploma', 'degree'];
      if (seniorKeywords.some(k => c.includes(k))) return true;
      const classNum = parseInt(c.replace(/\D/g, ''));
      if (!isNaN(classNum) && classNum >= 6) return true;
      return false;
    }

    function invalidateCache(keys) {
      if (!keys) {
        Object.keys(DATA_CACHE).forEach(k => {
          if (DATA_CACHE[k] && typeof DATA_CACHE[k] === 'object' && !Array.isArray(DATA_CACHE[k])) DATA_CACHE[k] = {};
          else DATA_CACHE[k] = null;
        });
        return;
      }
      keys.forEach(key => {
        if (DATA_CACHE[key] && typeof DATA_CACHE[key] === 'object' && !Array.isArray(DATA_CACHE[key])) DATA_CACHE[key] = {};
        else DATA_CACHE[key] = null;
      });
    }


    function closeMobileMenu() {
      // Check if we are in mobile view
      const offcanvasElement = document.getElementById('sidebarOffcanvas');
      const bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasElement);
      if (bsOffcanvas && window.innerWidth < 768) {
        bsOffcanvas.hide();
      }
    }

    function convertDriveLink(url) {
      if (typeof url === 'string' && url.includes('drive.google.com') && url.indexOf('id=') > -1) {
        var match = url.match(/id=([^&]+)/);
        if (match && match[1]) {
          // =s500 ensures a high-quality 500px image instead of a small thumbnail
          return 'https://lh3.googleusercontent.com/d/' + match[1] + '=s500';
        }
      }
      return url;
    }

    let role = '';
    function handleLoginSuccess(userRole) {
      role = userRole;
      document.getElementById('login').style.display = 'none';
      document.getElementById('main').style.display = 'block';

      // Helper for safe element access
      const setDisplay = (id, displayValue) => {
        const el = document.getElementById(id);
        if (el) el.style.display = displayValue;
      };

      // Hide all admin/faculty features by default
      setDisplay('feeDetailsBtn', 'none');
      setDisplay('addEventBtn', 'none');
      setDisplay('facultyDashboardBtn', 'none');

      if (role === 'super admin') {
        setDisplay('feeDetailsBtn', 'block');
        setDisplay('addEventBtn', 'block');
        setDisplay('facultyDashboardBtn', 'block');
        setDisplay('monthWisePaymentsBtn', 'block');
        setDisplay('pendingPaymentsBtn', 'block');
      }

      // Batch load dashboard data
      google.script.run.withSuccessHandler(data => {
        DATA_CACHE.studentStats = data.studentStats;
        DATA_CACHE.feeStats = data.feeStats;
        DATA_CACHE.testStats = data.testStats;
        DATA_CACHE.eventStats = data.eventStats;
        showPage('studentDashboard');
      }).getDashboardData();
    }

    function login() {
      // DEBUG: Verify function call
      console.log("Login button clicked");
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showPremiumAlert("Please enter both username and password", "Error", "danger");
        return;
      }

      google.script.run
        .withFailureHandler(err => {
          console.error("Login Failed:", err);
          showPremiumAlert("Login Script Failed: " + err.message, "Error", "danger");
        })
        .withSuccessHandler(res => {
          console.log("Login Response:", res);
          if (res.success) {
            // Save Session
            sessionStorage.setItem('user', JSON.stringify({ username: username, role: res.role }));
            handleLoginSuccess(res.role);
          } else {

    function viewPaymentHistory(id, name) {
      console.log("Requesting history for:", id, name); // Debug Log
      // Show Loading
      const modalBody = document.getElementById('paymentHistoryBody');
      modalBody.innerHTML = '<tr><td colspan="3" class="text-center">Loading history...</td></tr>';

      // Show modal safely
      const modalEl = document.getElementById('paymentHistoryModal');
      // Check if modal instance exists or create new (avoid duplicate backdrops)
      let modal = bootstrap.Modal.getInstance(modalEl);
      if (!modal) {
        modal = new bootstrap.Modal(modalEl);
      }
      modal.show();

      google.script.run
        .withFailureHandler(err => {
          modalBody.innerHTML = `<tr><td colspan="3" class="text-danger">Error: ${err.message}</td></tr>`;
        })
        .withSuccessHandler(history => {
          if (!history || history.length === 0) {
            modalBody.innerHTML = '<tr><td colspan="3" class="text-center">No payment history found for this student.</td></tr>';
            return;
          }

          if (history[0] && history[0].error) {
            modalBody.innerHTML = `<tr><td colspan="3" class="text-danger fw-bold">${history[0].message}</td></tr>`;
            return;
          }

          // Check for Debug/Error
          if (history[0].error) {
            modalBody.innerHTML = `<tr><td colspan="3" class="text-danger fw-bold">${history[0].message}</td></tr>`;
            return;
          }

          // Check for Fallback Data
          let html = '';
          if (history[0].isFallback) {
            html += `<tr><td colspan="3" class="table-warning text-center fw-bold">No direct match found.<br><small>${history[0].debug}</small><br>Showing last 5 payments in system:</td></tr>`;
            // Add extra headers for context
            html += `<tr class="table-light"><td colspan="3"><small>ID | Name | Date | Amount</small></td></tr>`;
          }

          html += history.map(h => {
            // Client-side Date Formatting
            let displayDate = h.date;
            try {
              if (displayDate) {
                const d = new Date(displayDate);
                if (!isNaN(d.getTime())) {
                  const day = String(d.getDate()).padStart(2, '0');
                  const month = String(d.getMonth() + 1).padStart(2, '0');
                  const year = d.getFullYear();
                  displayDate = `${day}-${month}-${year}`;
                }
              }
            } catch (e) { console.error("Date format error", e); }

            // If fallback, show ID/Name
            if (h.isFallback) {
              return `
              <tr>
                <td colspan="3">
                  <span class="badge bg-secondary">${h.id}</span> <b>${h.studentName}</b><br>
                  ${displayDate || '-'} | ₹${h.amount || 0} (${h.monthYear || '-'})
                </td>
              </tr>
            `;
            }

            return `
              <tr>
                <td>${displayDate || '-'}</td>
                <td>${h.amount || 0}</td>
                <td>${h.monthYear || '-'}</td>
              </tr>
            `;
          }).join('');

          modalBody.innerHTML = html;
        }).getPaymentHistoryDebug(id, name);
    }

    function populateStudentTable(type) {
      const search = document.getElementById(type + 'Search').value.toLowerCase();
      const classFilter = document.getElementById(type + 'ClassFilter').value;
      const tableId = type + 'Table';

      const primaryClasses = ['LKG', 'UKG', 'Class 1', 'Class 2', 'Class 3', 'Class 4', 'Class 5'];
      const seniorClasses = ['Class 6', 'Class 7', 'Class 8', 'Class 9', 'Class 10', 'Inter 1st year', 'Inter 2nd year', 'Diploma', 'Degree'];
      const targetGroup = (type === 'primary') ? primaryClasses : seniorClasses;

      const classOrder = ['LKG', 'UKG', 'Class 1', 'Class 2', 'Class 3', 'Class 4', 'Class 5', 'Class 6', 'Class 7', 'Class 8', 'Class 9', 'Class 10', 'Inter 1st year', 'Inter 2nd year', 'Diploma', 'Degree'];
      const classOrderMap = classOrder.reduce((acc, cls, idx) => { acc[cls] = idx; return acc; }, {});

      const processData = (data) => {
        const tbody = document.getElementById(tableId).querySelector('tbody');
        const countBadge = document.getElementById(type + 'Count');
        if (!data || data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="12" class="text-danger">No students found.</td></tr>`;
          if (countBadge) countBadge.innerText = 'Count: 0';
          return;
        }

        let filtered = data;

        // 1. Group Filter (Exhaustive & Mutually Exclusive)
        filtered = filtered.filter(row => {
          const cls = (row[5] || '').toString().trim();
          const isSenior = isSeniorClass(cls);
          return (type === 'senior') ? isSenior : !isSenior;
        });

        // 2. Specific Class Filter
        if (classFilter && classFilter !== 'All') {
          filtered = filtered.filter(row => (row[5] || '').toString().trim() === classFilter);
        }

        // 3. Search
        if (search) {
          filtered = filtered.filter(row => {
            const name = (row[2]) ? row[2].toString().toLowerCase() : '';
            const school = (row[4]) ? row[4].toString().toLowerCase() : '';
            const contact = (row[6]) ? row[6].toString() : '';
            return name.includes(search) || school.includes(search) || contact.includes(search);
          });
        }

        // Update Count
        if (countBadge) countBadge.innerText = 'Count: ' + filtered.length;

        // 4. Sorting (LKG -> Inter)
        filtered.sort((a, b) => {
          const orderA = classOrderMap[a[5]] ?? 99;
          const orderB = classOrderMap[b[5]] ?? 99;
          if (orderA !== orderB) return orderA - orderB;
          return a[2].toString().localeCompare(b[2].toString()); // Then Name
        });

        tbody.innerHTML = '';
        if (filtered.length === 0) {
          tbody.innerHTML = `<tr><td colspan="12" class="text-center">No matching records found in this group.</td></tr>`;
          return;
        }

        const headers = ['ID', 'Date Joining', 'Name', 'Gender', 'School', 'Class', 'Parent Contact', 'Actual Fee', 'Paid Fee', 'Payment Mode', 'Date Payment'];

        filtered.forEach((row, index) => {
          try {
            const tr = document.createElement('tr');
            const indicesToInclude = [0, 1, 2, 3, 4, 5, 6, 8, 9, 10, 11];

            indicesToInclude.forEach((idx, i) => {
              const cell = (row[idx] !== undefined && row[idx] !== null) ? row[idx] : '';
              const td = document.createElement('td');
              td.setAttribute('data-label', headers[i] || 'Info');
              if (idx === 1 || idx === 11) {
                td.innerText = formatDateDisplay(cell);
              } else {
                td.innerText = cell.toString();
              }
              tr.appendChild(td);
            });

            const td = document.createElement('td');
            td.setAttribute('data-label', 'Actions');
            const safeName = (row[2] || '').toString().replace(/'/g, "\\'");
            td.innerHTML = `<div class="d-flex gap-1">
              <button class="btn btn-warning btn-sm" onclick="editStudent('${row[0]}')">Edit</button> 
              <button class="btn btn-info btn-sm" onclick="viewPaymentHistory('${row[0]}', '${safeName}')">History</button>
              <button class="btn btn-danger btn-sm" onclick="deleteStudent('${row[0]}')">Del</button>
            </div>`;
            tr.appendChild(td);
            tbody.appendChild(tr);
          } catch (err) {
            console.error('Error rendering row', err);
          }
        });
      };

      if (DATA_CACHE.students) {
        processData(DATA_CACHE.students);
      } else {
        google.script.run.withSuccessHandler(data => {
          DATA_CACHE.students = data;
          processData(data);
        }).getStudents();
      }
    }

    const FACULTY_SUBJECTS = ['Telugu', 'Hindi', 'English', 'Maths', 'Science', 'Social', 'Physics', 'Biology'];


    let facStream = null;
    let facPhotoData = null;
    let facFacingMode = 'user';

    function openFacultyCamera() {
      document.getElementById('facCameraContainer').style.display = 'block';
      
      if (facStream) {
        facStream.getTracks().forEach(t => t.stop());
      }
      
      const constraints = { video: { facingMode: facFacingMode } };
      
      navigator.mediaDevices.getUserMedia(constraints).then(stream => {
        facStream = stream;
        document.getElementById('facVideo').srcObject = stream;
      }).catch(err => {
        if (facFacingMode === 'environment') {
          facFacingMode = 'user';
          openFacultyCamera();
        } else {
          showPremiumAlert("Camera error: " + err, "Camera Error", "danger");
        }
      });
    }

    function flipFacultyCamera() {
      facFacingMode = facFacingMode === 'user' ? 'environment' : 'user';
      openFacultyCamera();
    }

    function closeFacCamera() {
      if (facStream) {
        facStream.getTracks().forEach(t => t.stop());
        facStream = null;
      }
      document.getElementById('facCameraContainer').style.display = 'none';
    }

    function captureFacPhoto() {
      const video = document.getElementById('facVideo');
      const canvas = document.getElementById('facCanvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      facPhotoData = canvas.toDataURL('image/jpeg');
      document.getElementById('facPreview').src = facPhotoData;
      document.getElementById('facPreviewContainer').style.display = 'block';
      closeFacCamera();
    }

    function previewFacFile(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          facPhotoData = e.target.result;
          document.getElementById('facPreview').src = facPhotoData;
          document.getElementById('facPreviewContainer').style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function removeFacPhoto() {
      facPhotoData = null;
      document.getElementById('facPreview').src = '';
      document.getElementById('facPreviewContainer').style.display = 'none';
      document.getElementById('facPhotoFile').value = '';
    }

    function saveFaculty() {
      const name = document.getElementById('facName').value;
      const qual = document.getElementById('facQualification').value;
      const contact = document.getElementById('facContact').value;
      const subs = Array.from(document.querySelectorAll('.fac-sub:checked')).map(c => c.value);

      if (!name || !qual || !contact) return showPremiumAlert("Please fill Name, Qualification and Contact", "Missing Fields", "warning");

      const faculty = {
        Name: name,
        Qualification: qual,
        ContactNumber: contact,
        DateOfJoining: document.getElementById('facDOJ').value,
        TeachingSubjects: subs,
        Remarks: document.getElementById('facRemarks').value,
        Type: document.getElementById('facType') ? document.getElementById('facType').value : '',
        PhotoURL: ''
      };

      const proceedSave = (photoUrl = '') => {
        faculty.PhotoURL = photoUrl;
        console.log("Saving faculty data:", faculty);
        google.script.run
          .withFailureHandler(onFailure)
          .withSuccessHandler(() => {
            showPremiumAlert("Faculty saved!", "Success", "success");
            searchFaculty(true); // Force refresh cache
            closeInlineFacultyForm();
          }).addFaculty(faculty);
      };

      if (facPhotoData) {
        console.log("Uploading faculty photo...");
        const blob = facPhotoData.split(',');
        const mime = blob[0].match(/:(.*?);/)[1];
        const bytes = blob[1];
        google.script.run
          .withFailureHandler(onFailure)
          .withSuccessHandler(url => {
            console.log("Photo uploaded, URL:", url);
            proceedSave(url);
          }).uploadImage({
            name: 'fac_' + name + '_' + Date.now() + '.jpg',
            mimeType: mime,
            data: bytes
          });
      } else {
        proceedSave();
      }
    }

    function editFaculty(id) {
      if (!id) return showPremiumAlert("Invalid Faculty ID", "Error", "danger");
      showInlineFacultyForm('Edit Faculty');
      
      const formContainer = document.getElementById('facultyFormContainer');
      const header = formContainer.querySelector('.card-header span');

      const populateForm = (fac) => {
        console.log("Populating edit form with:", fac);
        header.innerText = 'Edit Faculty (ID: ' + id + ')';
        
        if (document.getElementById('facIdDisplay')) {
          document.getElementById('facIdDisplay').value = fac[0];
        }
        
        document.getElementById('facName').value = fac[1] || '';
        document.getElementById('facQualification').value = fac[2] || '';
        document.getElementById('facContact').value = fac[3] || '';
        document.getElementById('facDOJ').value = fac[6] || '';
        document.getElementById('facRemarks').value = fac[7] || '';
        
        if (document.getElementById('facType')) {
          const typeVal = fac[8] || 'New';
          document.getElementById('facType').value = typeVal;
          if (document.getElementById('facTypeDisplay')) {
            document.getElementById('facTypeDisplay').value = typeVal;
            document.getElementById('facTypeContainer').style.display = 'block';
          }
        }

        document.querySelectorAll('.fac-sub').forEach(chk => chk.checked = false);
        const subs = Array.isArray(fac[4]) ? fac[4] : (fac[4] ? fac[4].split(',') : []);
        subs.forEach(s => {
          const chk = document.getElementById('sub_' + s.trim());
          if (chk) chk.checked = true;
        });

        if (fac[5]) {
          const photoUrl = convertDriveLink(fac[5]);
          document.getElementById('facPreview').src = photoUrl;
          document.getElementById('facPreviewContainer').style.display = 'block';
        }

        const saveBtn = document.getElementById('facSaveBtn');
        if (saveBtn) {
          saveBtn.innerText = 'Update Faculty';
          saveBtn.onclick = () => updateFacultyData(id);
        }
      };

      // Try local cache first
      if (localFacultyCache) {
        const fac = localFacultyCache.find(f => String(f[0]) == String(id));
        if (fac) return populateForm(fac);
      }

      // Fallback to server if not found in cache
      header.innerHTML = `<i class="fas fa-spinner fa-spin me-2"></i>Loading Faculty Details...`;
      google.script.run
        .withFailureHandler(err => {
          showPremiumAlert("Error fetching data: " + err, "Error", "danger");
          header.innerText = 'Edit Faculty (Error)';
        })
        .withSuccessHandler(data => {
          if (!data || data.length === 0) {
            showPremiumAlert("Faculty not found!", "Error", "warning");
            header.innerText = 'Edit Faculty (Not Found)';
            return;
          }
          populateForm(data[0]);
        }).getFacultyById(id);
    }

    function updateFacultyData(id) {
      const name = document.getElementById('facName').value;
      const qual = document.getElementById('facQualification').value;
      const contact = document.getElementById('facContact').value;
      const subs = Array.from(document.querySelectorAll('.fac-sub:checked')).map(c => c.value);
      const type = document.getElementById('facType') ? document.getElementById('facType').value : '';

      if (!name || !qual || !contact) return showPremiumAlert("Please fill Name, Qualification and Contact", "Missing Fields", "warning");

      const faculty = {
        Name: name,
        Qualification: qual,
        ContactNumber: contact,
        DateOfJoining: document.getElementById('facDOJ').value,
        TeachingSubjects: subs,
        Remarks: document.getElementById('facRemarks').value,
        Type: type,
        PhotoURL: document.getElementById('facPreview').src.includes('drive.google.com') ? document.getElementById('facPreview').src : ''
      };

      const currentPhoto = document.getElementById('facPreview').src;
      // If it's a drive link and no new data was captured, keep it
      if (currentPhoto && currentPhoto.includes('googleusercontent.com') && !facPhotoData) {
        faculty.PhotoURL = currentPhoto;
      }

      const proceedUpdate = (photoUrl = '') => {
        if (photoUrl) faculty.PhotoURL = photoUrl;
        console.log("Updating faculty data (ID: " + id + "):", faculty);
        google.script.run
          .withFailureHandler(onFailure)
          .withSuccessHandler(() => {
            showPremiumAlert("Faculty updated!", "Success", "success");
            searchFaculty(true); // Force refresh cache
            closeInlineFacultyForm();
          }).updateFaculty(id, faculty);
      };

      if (facPhotoData) {
        console.log("Uploading replacement faculty photo...");
        const blob = facPhotoData.split(',');
        const mime = blob[0].match(/:(.*?);/)[1];
        const bytes = blob[1];
        google.script.run
          .withFailureHandler(onFailure)
          .withSuccessHandler(url => {
            console.log("Replacement photo uploaded, URL:", url);
            proceedUpdate(url);
          }).uploadImage({
            name: 'fac_' + name + '_' + Date.now() + '.jpg',
            mimeType: mime,
            data: bytes
          });
      } else {
        proceedUpdate(faculty.PhotoURL);
      }
    }

    function searchFeeDetails() {
      const search = document.getElementById('feeSearch').value.toLowerCase();

      const processData = (data) => {
        const tbody = document.getElementById('feeTable').querySelector('tbody');
        tbody.innerHTML = '';

        let filtered = data;

        // Month Filter
        const monthFilter = document.getElementById('feeMonthFilter').value; // YYYY-MM
        if (monthFilter) {
          filtered = filtered.filter(row => {
            if (!row.dateOfPayment) return false;
            // dateOfPayment should be ISO string or date string. Check if it starts with YYYY-MM
            // Handle various date formats if necessary
            return row.dateOfPayment.toString().startsWith(monthFilter);
          });
        }

        if (search) {
          filtered = filtered.filter(row => row.name.toLowerCase().includes(search));
        }

        if (filtered.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="text-center">No records found</td></tr>';
          return;
        }
        filtered.forEach(row => {
          const tr = document.createElement('tr');
          // Row format from backend: {name, class, actualFee, paidFee, dateOfPayment}
          tr.innerHTML = `
              <td data-label="Name">${row.name}</td>
              <td data-label="Class">${row.class}</td>
              <td data-label="Actual Fee">${row.actualFee}</td>
              <td data-label="Paid Fee">${row.paidFee}</td>
              <td data-label="Date Payment">${row.dateOfPayment ? formatDateDisplay(row.dateOfPayment) : ''}</td>
            `;
          tbody.appendChild(tr);
        });
      };

      if (DATA_CACHE.feeDetails) {
        processData(DATA_CACHE.feeDetails);
      } else {
        google.script.run.withSuccessHandler(data => {
          DATA_CACHE.feeDetails = data;
          processData(data);
        }).getFeeDetails();
      }
    }

                <h3 id="statPendingStudentsMonth">0</h3>
              </div>
            </div>
          </div>
        </div>

        <div class="table-responsive" id="monthWiseTableContainer" style="display:none;">
          <table class="table table-bordered table-striped" id="monthWiseTable">
            <thead class="bg-warning">
              <tr>
                <th>AdmissionID</th>
                <th>StudentName</th>
                <th>Contact</th>
                <th>Amount</th>
                <th>PaymentDate</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      `;
      loadMonthYearOptions();
    }

    function loadMonthYearOptions() {
      const select = document.getElementById('monthYearSelect');
      if (!select) return;

      const processOptions = (options) => {
        select.innerHTML = '<option value="">-- Choose Month --</option>';
        if (options && options.length > 0) {
          options.forEach(opt => {
            select.innerHTML += `<option value="${opt}">${opt}</option>`;
          });
          if (UI_STATE.selectedMonthWiseMonth) {
            select.value = UI_STATE.selectedMonthWiseMonth;
            fetchMonthWiseData();
          } else if (options.length > 0) {
            // Default to most recent month
            select.value = options[0];
            fetchMonthWiseData();
          }
        } else {
          select.innerHTML = '<option value="">No history found</option>';
        }
      };

      if (DATA_CACHE.monthYearOptions) {
        processOptions(DATA_CACHE.monthYearOptions);
      } else {
        google.script.run.withSuccessHandler(options => {
          DATA_CACHE.monthYearOptions = options;
          processOptions(options);
        }).getMonthYearOptions();
      }
    }

    function fetchMonthWiseData() {
      const monthYear = document.getElementById('monthYearSelect').value;
      UI_STATE.selectedMonthWiseMonth = monthYear; // Save to state
      const statsDiv = document.getElementById('monthWiseStats');
      const tableDiv = document.getElementById('monthWiseTableContainer');
      const tbody = document.getElementById('monthWiseTable').querySelector('tbody');

      if (!monthYear) {
        if (statsDiv) statsDiv.style.display = 'none';
        if (tableDiv) tableDiv.style.display = 'none';
        return;
      }

      const updateUI = (res) => {
        if (res.error) {
          showPremiumAlert('Error: ' + res.message, "Error", "danger");
          return;
        }

        // Update Stats
        document.getElementById('statTotalCollectedMonth').innerText = '₹' + res.stats.totalCollected;
        document.getElementById('statTotalStudentsPaidMonth').innerText = res.stats.totalStudentsPaid;
        document.getElementById('statPendingStudentsMonth').innerText = res.stats.pendingStudents;
        statsDiv.style.display = 'flex';

        // Update Table
        tbody.innerHTML = '';
        if (res.payments && res.payments.length > 0) {
          res.payments.forEach(p => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td data-label="AdmissionID">${p.admissionId}</td>
              <td data-label="StudentName">${p.studentName}</td>
              <td data-label="Contact">${p.contact}</td>
              <td data-label="Amount">₹${p.amount}</td>
              <td data-label="PaymentDate">${formatDateDisplay(p.paymentDate)}</td>
            `;
            tbody.appendChild(tr);
          });
        } else {
          tbody.innerHTML = '<tr><td colspan="5" class="text-center">No payments found for this month</td></tr>';
        }
      };

      if (DATA_CACHE.monthWiseData[monthYear]) {
        tableDiv.style.display = 'block';
        updateUI(DATA_CACHE.monthWiseData[monthYear]);
      } else {
        // Show Loading state
        tbody.innerHTML = '<tr><td colspan="5" class="text-center">Loading data...</td></tr>';
        tableDiv.style.display = 'block';

        google.script.run
          .withFailureHandler(err => {
            console.error("Month Wise Data Fetch Failed:", err);
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Error loading data: ${err.message || err}</td></tr>`;
          })
          .withSuccessHandler(res => {
            console.log("Month Wise Data Received:", res);
            DATA_CACHE.monthWiseData[monthYear] = res;
            updateUI(res);
          }).getMonthWiseData(monthYear);
      }
    }

    function renderPendingPayments() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="card mb-3">
          <div class="card-header">Pending Payments</div>
          <div class="card-body">
            <div class="row align-items-center">
              <div class="col-md-4">
                <label class="form-label">Select Month-Year</label>
                <select id="pendingMonthYearSelect" class="form-select" onchange="fetchPendingPaymentsData()">
                  <option value="">Loading months...</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div id="pendingStats" class="row mb-3" style="display:none;">
          <div class="col-md-4">
            <div class="card bg-danger text-white">
              <div class="card-body text-center">
                <h5>Pending Students</h5>
                <h3 id="statPendingCount">0</h3>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card bg-success text-white">
              <div class="card-body text-center">
                <h5>Paid Students</h5>
                <h3 id="statPaidCount">0</h3>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card bg-info text-white">
              <div class="card-body text-center">
                <h5>Total Students</h5>
                <h3 id="statTotalStudentsPending">0</h3>
              </div>
            </div>
          </div>
        </div>

        <div class="table-responsive" id="pendingTableContainer" style="display:none;">
          <table class="table table-bordered table-striped" id="pendingTable">
            <thead class="bg-warning">
              <tr>
                <th>AdmissionID</th>
                <th>StudentName</th>
                <th>Class</th>
                <th>Contact</th>
                <th>Actual Fee</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      `;
      loadPendingMonthYearOptions();
    }

    function loadPendingMonthYearOptions() {
      const select = document.getElementById('pendingMonthYearSelect');
      if (!select) return;

      const processOptions = (options) => {
        select.innerHTML = '<option value="">-- Choose Month --</option>';
        if (options && options.length > 0) {
          options.forEach(opt => {
            select.innerHTML += `<option value="${opt}">${opt}</option>`;
          });

          // Restore state if exists or default to most recent
          if (UI_STATE.selectedPendingMonth) {
            select.value = UI_STATE.selectedPendingMonth;
            fetchPendingPaymentsData();
          } else if (options.length > 0) {
            select.value = options[0];
            fetchPendingPaymentsData();
          }
        } else {
          select.innerHTML = '<option value="">No history found</option>';
        }
      };

      if (DATA_CACHE.monthYearOptions) {
        processOptions(DATA_CACHE.monthYearOptions);
      } else {
        google.script.run.withSuccessHandler(options => {
          DATA_CACHE.monthYearOptions = options;
          processOptions(options);
        }).getMonthYearOptions();
      }
    }

    function fetchPendingPaymentsData() {
      const monthYear = document.getElementById('pendingMonthYearSelect').value;
      UI_STATE.selectedPendingMonth = monthYear; // Save to state
      const statsDiv = document.getElementById('pendingStats');
      const tableDiv = document.getElementById('pendingTableContainer');
      const tbody = document.getElementById('pendingTable').querySelector('tbody');

      if (!monthYear) {
        if (statsDiv) statsDiv.style.display = 'none';
        if (tableDiv) tableDiv.style.display = 'none';
        return;
      }

      const updateUI = (res) => {
        if (res.error) {
          showPremiumAlert('Error: ' + res.message, "Error", "danger");
          return;
        }

        // Update Stats
        document.getElementById('statPendingCount').innerText = res.stats.pendingCount;
        document.getElementById('statPaidCount').innerText = res.stats.paidCount;
        document.getElementById('statTotalStudentsPending').innerText = res.stats.totalStudents;
        statsDiv.style.display = 'flex';

        // Update Table
        tbody.innerHTML = '';
        if (res.pending && res.pending.length > 0) {
          res.pending.forEach(p => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td data-label="AdmissionID">${p.admissionId}</td>
              <td data-label="StudentName">${p.studentName}</td>
              <td data-label="Class">${p.class}</td>
              <td data-label="Contact">${p.contact}</td>
              <td data-label="Actual Fee">₹${p.actualFee}</td>
            `;
            tbody.appendChild(tr);
          });
        } else {
          tbody.innerHTML = '<tr><td colspan="5" class="text-center">No pending payments for this month!</td></tr>';
        }
      };

      if (DATA_CACHE.pendingPaymentsData[monthYear]) {
        tableDiv.style.display = 'block';
        updateUI(DATA_CACHE.pendingPaymentsData[monthYear]);
      } else {
        // Show Loading state
        tbody.innerHTML = '<tr><td colspan="5" class="text-center">Loading data...<br><small class="text-muted">This may take a moment if the sheet is large.</small></td></tr>';
        tableDiv.style.display = 'block';

        const timeoutId = setTimeout(() => {
          const rows = tbody.querySelectorAll('tr');
          if (rows.length === 1 && rows[0].innerText.includes('Loading data...')) {
            const warningTr = document.createElement('tr');
            warningTr.innerHTML = '<td colspan="5" class="text-center text-warning fw-bold">Still loading... If it takes too long, please check your internet or refresh the page.</td>';
            tbody.appendChild(warningTr);
          }
        }, 15000);

        google.script.run
          .withFailureHandler(err => {
            console.error("Pending Payments Data Fetch Failed:", err);
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Error loading data: ${err.message || err}</td></tr>`;
          })
          .withSuccessHandler(res => {
            console.log("Pending Payments Data Received:", res);
            DATA_CACHE.pendingPaymentsData[monthYear] = res;
            updateUI(res);
          }).getPendingPaymentsData(monthYear);
      }
    }
    // Premium Modal Logic
    let premiumConfirmCallback = null;

    function showPremiumAlert(message, title = 'Notification', type = 'info') {
      document.getElementById('premiumAlertTitle').innerText = title;
      document.getElementById('premiumAlertMessage').innerText = message;
      
      const header = document.getElementById('premiumAlertHeader');
      header.className = 'modal-header text-white border-0 py-3';
      if (type === 'danger') header.classList.add('bg-danger');
      else if (type === 'success') header.classList.add('bg-success');
      else header.classList.add('bg-info');
      
      const elem = document.getElementById('premiumAlertModal');
      const modal = bootstrap.Modal.getInstance(elem) || new bootstrap.Modal(elem);
      modal.show();
    }

    function showPremiumConfirm(message, title = 'Confirm Action', type = 'warning', callback) {
      document.getElementById('premiumConfirmTitle').innerText = title;
      document.getElementById('premiumConfirmMessage').innerText = message;
      
      premiumConfirmCallback = callback;
      
      const btn = document.getElementById('premiumConfirmBtn');
      btn.className = 'btn px-4 rounded-pill fw-bold';
      const header = document.getElementById('premiumConfirmHeader');
      header.className = 'modal-header border-0';
      if (type === 'danger') {
        btn.classList.add('btn-danger', 'text-white');
        header.classList.add('bg-danger', 'text-white');
      } else {
        btn.classList.add('btn-warning', 'text-dark');
        header.classList.add('bg-warning', 'text-dark');
      }
      
      const elem = document.getElementById('premiumConfirmModal');
      const modal = bootstrap.Modal.getInstance(elem) || new bootstrap.Modal(elem);
      modal.show();
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('premiumConfirmBtn').addEventListener('click', function() {
        if (premiumConfirmCallback) {
          premiumConfirmCallback();
          premiumConfirmCallback = null;
        }
      });
    });
  </script>

  <!-- Premium Alert Modal -->
  <div class="modal fade" id="premiumAlertModal" tabindex="-1" aria-hidden="true" style="z-index: 2060;">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content border-0 shadow-lg" style="border-radius: 12px;">
        <div class="modal-header text-white py-3" id="premiumAlertHeader">
          <h5 class="modal-title w-100 text-center fw-bold" id="premiumAlertTitle">Notification</h5>
        </div>
        <div class="modal-body text-center p-4">
          <p id="premiumAlertMessage" class="mb-0 fs-5 text-secondary"></p>
        </div>
        <div class="modal-footer justify-content-center border-0 pb-4">
          <button type="button" class="btn btn-secondary px-4 rounded-pill" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Premium Confirm Modal -->
  <div class="modal fade" id="premiumConfirmModal" tabindex="-1" aria-hidden="true" style="z-index: 2060;">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content border-0 shadow-lg" style="border-radius: 12px;">
        <div class="modal-header border-0" id="premiumConfirmHeader">
          <h5 class="modal-title w-100 text-center fw-bold" id="premiumConfirmTitle">Confirm Action</h5>
        </div>
        <div class="modal-body text-center p-4">
          <p id="premiumConfirmMessage" class="mb-0 fs-5 text-secondary"></p>
        </div>
        <div class="modal-footer justify-content-center border-0 pb-4">
          <button type="button" class="btn btn-outline-secondary px-4 rounded-pill fw-bold" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-warning px-4 rounded-pill fw-bold text-dark" id="premiumConfirmBtn" data-bs-dismiss="modal">Confirm</button>
        </div>
      </div>
    </div>
  </div>
